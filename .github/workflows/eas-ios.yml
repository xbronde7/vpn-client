name: EAS iOS Build and Submit

on:
  workflow_dispatch:

jobs:
  ios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: project

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS production app
        run: eas build -p ios --profile production --non-interactive
        working-directory: project

      - name: Submit latest iOS build to App Store Connect
        run: eas submit -p ios --profile production --latest --non-interactive
        working-directory: project
